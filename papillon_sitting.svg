<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 240" width="210" height="240">
  <!-- Tail (curled up behind body) -->
  <path d="M148,138 Q175,100 168,138 Q163,158 146,152"
        fill="none" stroke="#F5EFE6" stroke-width="9" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="108" cy="170" rx="54" ry="46" fill="#F5EFE6" stroke="#C8882A" stroke-width="2.5"/>
  <!-- Body ochre saddle patch -->
  <ellipse cx="118" cy="162" rx="30" ry="26" fill="#C8882A" opacity="0.5"/>

  <!-- Neck -->
  <ellipse cx="108" cy="126" rx="20" ry="17" fill="#F5EFE6" stroke="#C8882A" stroke-width="2"/>

  <!-- Head -->
  <circle cx="108" cy="95" r="32" fill="#F5EFE6" stroke="#C8882A" stroke-width="2.5"/>

  <!-- Left butterfly ear -->
  <path d="M80,80 C60,42 32,50 36,78 C40,100 70,97 80,82Z"
        fill="#C8882A" stroke="#C4470A" stroke-width="2"/>
  <!-- Left ear inner vein detail -->
  <path d="M78,80 C62,56 44,60 46,78" fill="none" stroke="#C4470A" stroke-width="1" opacity="0.4"/>
  <!-- Left ear fringe -->
  <line x1="36" y1="80" x2="24" y2="73" stroke="#F5EFE6" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="37" y1="90" x2="24" y2="86" stroke="#F5EFE6" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="68" x2="30" y2="59" stroke="#F5EFE6" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <line x1="48" y1="58" x2="42" y2="47" stroke="#F5EFE6" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>

  <!-- Right butterfly ear -->
  <path d="M136,80 C156,42 184,50 180,78 C176,100 146,97 136,82Z"
        fill="#C8882A" stroke="#C4470A" stroke-width="2"/>
  <!-- Right ear inner vein -->
  <path d="M138,80 C154,56 172,60 170,78" fill="none" stroke="#C4470A" stroke-width="1" opacity="0.4"/>
  <!-- Right ear fringe -->
  <line x1="180" y1="80" x2="192" y2="73" stroke="#F5EFE6" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="179" y1="90" x2="192" y2="86" stroke="#F5EFE6" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="176" y1="68" x2="186" y2="59" stroke="#F5EFE6" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
  <line x1="168" y1="58" x2="174" y2="47" stroke="#F5EFE6" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>

  <!-- Face mask patch -->
  <path d="M86,92 C90,79 102,75 108,75 C114,75 126,79 130,92 C125,101 116,104 108,104 C100,104 91,101 86,92Z"
        fill="#C8882A" opacity="0.6"/>
  <!-- White blaze on forehead -->
  <ellipse cx="108" cy="78" rx="6" ry="9" fill="#F5EFE6"/>

  <!-- Eyes -->
  <circle cx="93" cy="89" r="7.5" fill="#2C1A0E"/>
  <circle cx="123" cy="89" r="7.5" fill="#2C1A0E"/>
  <!-- Eye shine -->
  <circle cx="95.5" cy="86.5" r="2.4" fill="white"/>
  <circle cx="125.5" cy="86.5" r="2.4" fill="white"/>
  <!-- Small lower shine -->
  <circle cx="97" cy="91" r="1" fill="white" opacity="0.5"/>
  <circle cx="127" cy="91" r="1" fill="white" opacity="0.5"/>

  <!-- Nose -->
  <path d="M102,105 C106,101 110,101 114,105 C110,112 106,112 102,105Z" fill="#C4470A"/>

  <!-- Mouth -->
  <path d="M106,111 Q108,115 110,111" fill="none" stroke="#C4470A" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Front left paw -->
  <rect x="80" y="204" width="24" height="13" rx="9" fill="#F5EFE6" stroke="#C8882A" stroke-width="2"/>
  <!-- Front right paw -->
  <rect x="110" y="204" width="24" height="13" rx="9" fill="#F5EFE6" stroke="#C8882A" stroke-width="2"/>

  <!-- Toe lines left paw -->
  <line x1="86" y1="210" x2="86" y2="215" stroke="#C8882A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="92" y1="211" x2="92" y2="216" stroke="#C8882A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="98" y1="210" x2="98" y2="215" stroke="#C8882A" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Toe lines right paw -->
  <line x1="116" y1="210" x2="116" y2="215" stroke="#C8882A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="122" y1="211" x2="122" y2="216" stroke="#C8882A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="128" y1="210" x2="128" y2="215" stroke="#C8882A" stroke-width="1.4" stroke-linecap="round"/>
</svg>
