<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 210" width="230" height="210">
  <!-- Left butterfly ear (large wing) -->
  <path d="M82,112 C56,55 18,64 22,102 C26,134 64,130 82,114Z"
        fill="#C8882A" stroke="#C4470A" stroke-width="2.5"/>
  <!-- Left ear inner shadow vein -->
  <path d="M80,110 C60,72 30,78 32,100 C34,120 62,118 80,110Z"
        fill="#C4470A" opacity="0.3"/>
  <!-- Left ear fringe -->
  <line x1="22" y1="102" x2="8"  y2="95"  stroke="#F5EFE6" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="116" x2="9"  y2="112" stroke="#F5EFE6" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="24" y1="88"  x2="11" y2="79"  stroke="#F5EFE6" stroke-width="1.9" stroke-linecap="round" opacity="0.55"/>
  <line x1="30" y1="74"  x2="19" y2="63"  stroke="#F5EFE6" stroke-width="1.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="63"  x2="32" y2="50"  stroke="#F5EFE6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Right butterfly ear (large wing) -->
  <path d="M148,112 C174,55 212,64 208,102 C204,134 166,130 148,114Z"
        fill="#C8882A" stroke="#C4470A" stroke-width="2.5"/>
  <!-- Right ear inner shadow vein -->
  <path d="M150,110 C170,72 200,78 198,100 C196,120 168,118 150,110Z"
        fill="#C4470A" opacity="0.3"/>
  <!-- Right ear fringe -->
  <line x1="208" y1="102" x2="222" y2="95"  stroke="#F5EFE6" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="206" y1="116" x2="221" y2="112" stroke="#F5EFE6" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="206" y1="88"  x2="219" y2="79"  stroke="#F5EFE6" stroke-width="1.9" stroke-linecap="round" opacity="0.55"/>
  <line x1="200" y1="74"  x2="211" y2="63"  stroke="#F5EFE6" stroke-width="1.7" stroke-linecap="round" opacity="0.5"/>
  <line x1="190" y1="63"  x2="198" y2="50"  stroke="#F5EFE6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Head -->
  <circle cx="115" cy="118" r="54" fill="#F5EFE6" stroke="#C8882A" stroke-width="2.5"/>

  <!-- Face mask / patch -->
  <path d="M85,116 C89,98 102,92 115,92 C128,92 141,98 145,116 C139,128 129,133 115,133 C101,133 91,128 85,116Z"
        fill="#C8882A" opacity="0.58"/>

  <!-- White blaze on forehead -->
  <ellipse cx="115" cy="98" rx="8" ry="12" fill="#F5EFE6"/>

  <!-- Eyes -->
  <circle cx="98"  cy="112" r="9.5" fill="#2C1A0E"/>
  <circle cx="132" cy="112" r="9.5" fill="#2C1A0E"/>
  <!-- Primary eye shine -->
  <circle cx="101" cy="108" r="3"   fill="white"/>
  <circle cx="135" cy="108" r="3"   fill="white"/>
  <!-- Small secondary shine -->
  <circle cx="103" cy="115" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="137" cy="115" r="1.2" fill="white" opacity="0.5"/>

  <!-- Nose -->
  <path d="M108,132 C112,127 118,127 122,132 C118,140 112,140 108,132Z" fill="#C4470A"/>

  <!-- Mouth -->
  <path d="M111,140 Q115,145 119,140" fill="none" stroke="#C4470A" stroke-width="2" stroke-linecap="round"/>

  <!-- Chin / chest fluff -->
  <ellipse cx="115" cy="168" rx="34" ry="14" fill="#F5EFE6" stroke="#C8882A" stroke-width="2"/>
  <!-- Chest fluff lower curve -->
  <path d="M86,172 Q115,192 144,172" fill="#F5EFE6" stroke="#C8882A" stroke-width="2" stroke-linecap="round"/>
</svg>
